<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="candle.css" />
    <title>Candle</title>
  </head>
  <body>
    <main>
      <h1>Candle Timer</h1>
      <div class="candle-timer">
        <p id="time-left">00:00:00</p>
        <div class="candle-container">
          <div id="candle-body"></div>
        </div>
        <button id="click-btn">1 minute</button>
      </div>
      <div class="images">
        <img src="1.webp" style="position: absolute; z-index: 1" />
        <img src="2.gif" style="position: absolute; z-index: 2" />
        <img
          src="3.gif"
          style="
            position: absolute;
            z-index: 2;
            margin-left: 400px;
            margin-top: 200px;
          "
        />
      </div>
      <div
        style="
          background-color: red;
          width: 411px;
          height: 293px;
          margin-top: 500px;
        "
      ></div>
    </main>
    <script src="candle.js" defer></script>
  </body>
</html>
